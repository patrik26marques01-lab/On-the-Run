<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>On The Run: Overdrive</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
html,body { width:100%; height:100%; overflow:hidden; background:#050508; font-family:'Impact', 'Arial Black', sans-serif; user-select: none; }
#gameCanvas { display:block; margin:0 auto; touch-action:none; box-shadow: 0 0 30px rgba(255,153,0,0.2); }
#ui { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index: 10; }
.btn { pointer-events:auto; }

.hud { position:absolute; top:20px; left:5%; width:90%; display:flex; justify-content:space-between; color:#fff; font-size:22px; text-shadow:3px 3px 0 #000; letter-spacing: 1px; }
.score-box { color: #00ffcc; font-style: italic; }
.coin-box { color: #ffcc00; font-style: italic; }

#menuScreen, #gameOverScreen {
  position:absolute; inset:0; background:radial-gradient(circle, rgba(16,16,32,0.85) 0%, rgba(5,5,10,0.95) 100%);
  display:flex; flex-direction:column; align-items:center; justify-content:center; color:#fff; text-align:center; pointer-events:auto;
}
.hidden { display:none !important; }

.card {
  background: #11111e; border:4px solid #ff9900; border-radius:24px; padding:40px 30px;
  width:92%; max-width:400px; box-shadow: 0 20px 50px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,153,0,0.1);
}
h1 { font-size:42px; color:#ff9900; margin-bottom:5px; text-shadow: 3px 3px 0 #4a0000; font-style: italic; letter-spacing: 2px; }
.subtitle { font-family: Arial, sans-serif; font-size:14px; color:#aaa; margin-bottom:30px; font-weight: bold; }
.stats { font-size: 26px; color: #fff; margin-bottom: 25px; }
.btn-action {
  background: linear-gradient(180deg, #ffcc00 0%, #ff6600 100%); color:#000; border:none;
  padding:16px 32px; font-size:24px; font-weight:900; border-radius:12px; cursor:pointer; width:100%;
  box-shadow: 0 6px 0 #993300; transition: all 0.1s; text-transform: uppercase; font-style: italic;
}
.btn-action:active { transform: translateY(4px); box-shadow: 0 2px 0 #993300; }
</style>
</head>
<body>

<canvas id="gameCanvas"></canvas>

<div id="ui">
  <div class="hud">
    <div class="score-box">🏁 <span id="scoreVal">0</span> m</div>
    <div class="coin-box">🪙 $<span id="coinsVal">0</span></div>
  </div>

  <!-- MENU PRINCIPAL -->
  <div id="menuScreen">
    <div class="card">
      <h1>ON THE RUN</h1>
      <div style="color:#ffcc00; font-size:18px; margin-bottom:15px;">OVERDRIVE EDITION</div>
      <p class="subtitle">Toque nas laterais da tela ou use as Setas (⬅️ ➡️) para pilotar. Desvie do tráfego pesado e colete bônus!</p>
      <button class="btn-action btn" id="startBtn">INICIAR CORRIDA</button>
    </div>
  </div>

  <!-- GAME OVER -->
  <div id="gameOverScreen" class="hidden">
    <div class="card">
      <h1 style="color:#ff3333; text-shadow: 3px 3px 0 #200;">💥 BATEU! 💥</h1>
      <p class="subtitle" style="margin-bottom:15px;">O tráfego venceu desta vez.</p>
      <div class="stats">
        <div style="color:#00ffcc;">DISTÂNCIA: <span id="finalScore">0</span>m</div>
        <div style="color:#ffcc00; font-size:20px; margin-top:5px;">CASH: +$<span id="finalCoins">0</span></div>
      </div>
      <button class="btn-action btn" id="restartBtn">JOGAR NOVAMENTE</button>
    </div>
  </div>
</div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

// ÁUDIO SYNTH (Miniclip Raiz sem arquivos externos)
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
function playTone(freq, type, duration, vol=0.1) {
  try {
    let osc = audioCtx.createOscillator();
    let gain = audioCtx.createGain();
    osc.type = type; osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, audioCtx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + duration);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); osc.stop(audioCtx.currentTime + duration);
  } catch(e){}
}

// Configurações Globais
let gameRunning = false, gameOver = false;
let score = 0, coins = 0, speed = 0;
const maxSpeed = 45; 
let camShake = 0;

// Engine de Pista Pseudo-3D
let horizon, roadW, roadX, trackPos = 0;
let curveMagnitude = 0, targetCurve = 0, curveTimer = 0;

// Jogador (Carro Esportivo)
let player = {
  x: 0,        // Posição na pista (-1 esquerda total, 1 direita total)
  targetX: 0,  // Alvo do movimento lateral suave
  y: 0, w: 76, h: 46,
  turnSpeed: 0.09
};

// Tráfego e Itens
let entities = [];
let spawnTimer = 0;

function resize() {
  canvas.width = Math.min(window.innerWidth, 500);
  canvas.height = window.innerHeight;
  horizon = canvas.height * 0.45;
  roadW = canvas.width * 0.9;
  roadX = canvas.width / 2;
  player.y = canvas.height - 120;
}
window.addEventListener('resize', resize);

// Controles Fluídos (Teclado e Toque sem travar o carro nas bordas)
const keys = {};
window.addEventListener('keydown', e => { keys[e.key] = true; if(audioCtx.state === 'suspended') audioCtx.resume(); });
window.addEventListener('keyup', e => keys[e.key] = false);

let touchSide = null;
window.addEventListener('touchstart', e => {
  if (e.target.classList.contains('btn') || e.target.closest('.btn')) return;
  if(audioCtx.state === 'suspended') audioCtx.resume();
  let tX = e.touches[0].clientX;
  touchSide = (tX < window.innerWidth / 2) ? 'left' : 'right';
});
window.addEventListener('touchmove', e => {
  let tX = e.touches[0].clientX;
  touchSide = (tX < window.innerWidth / 2) ? 'left' : 'right';
});
window.addEventListener('touchend', () => touchSide = null);

function spawnEntity() {
  let isCoin = Math.random() < 0.35;
  // Geração randômica contínua em qualquer lugar da largura da pista (-0.75 a 0.75)
  let pX = (Math.random() * 1.5) - 0.75; 
  
  entities.push({
    x: pX, z: 0.01,
    type: isCoin ? 'coin' : 'car',
    carColor: isCoin ? null : `hsl(${Math.random()*360}, 75%, 35%)`,
    speedOffset: isCoin ? 0 : -(Math.random() * 0.002 + 0.001)
  });
}

function resetGame() {
  score = 0; coins = 0; speed = 15; trackPos = 0;
  entities = []; player.x = 0; player.targetX = 0;
  curveMagnitude = 0; targetCurve = 0;
  gameOver = false;
  document.getElementById('scoreVal').innerText = score;
  document.getElementById('coinsVal').innerText = coins;
}

function update() {
  if (!gameRunning || gameOver) return;

  // Lógica de Movimentação Dinâmica (Sem travar o carro em faixas fixas!)
  if (keys['ArrowLeft'] || touchSide === 'left') player.targetX -= player.turnSpeed;
  if (keys['ArrowRight'] || touchSide === 'right') player.targetX += player.turnSpeed;
  
  // Limites físicos da pista (Guarda-reios)
  player.targetX = Math.max(-0.82, Math.min(0.82, player.targetX));
  player.x += (player.targetX - player.x) * 0.3; // Interpolação ultra suave

  // Aceleração Progressiva e Efeito de velocidade
  if (speed < maxSpeed) speed += 0.015;
  trackPos += speed;
  score += Math.floor(speed / 10);
  document.getElementById('scoreVal').innerText = score;

  // Gerador de Curvas Dinâmicas da Pista (Pseudo-3D Real)
  curveTimer -= speed;
  if(curveTimer <= 0) {
    targetCurve = (Math.random() * 4) - 2; // Intensidade e direção da curva
    curveTimer = Math.random() * 2000 + 1000;
  }
  curveMagnitude += (targetCurve - curveMagnitude) * 0.02;
  roadX = (canvas.width / 2) + (curveMagnitude * 40 * (speed / maxSpeed));

  // Efeito de Tremor da Câmera em alta velocidade
  camShake = (speed > maxSpeed * 0.8) ? (Math.random() * (speed*0.08) - (speed*0.04)) : 0;

  // Spawn Engine
  spawnTimer += speed;
  if (spawnTimer > 280) { spawnEntity(); spawnTimer = 0; }

  // Processador de Entidades e Colisão Avançada
  for (let i = entities.length - 1; i >= 0; i--) {
    let ent = entities[i];
    ent.z += (speed * 0.0006) + ent.speedOffset;

    if (ent.z >= 1.0) { entities.splice(i, 1); continue; }

    // Detecção de Colisão Precisa Baseada em Escala
    if (ent.z > 0.78 && ent.z < 0.92) {
      let distanceX = Math.abs(ent.x - player.x);
      let collisionWidth = ent.type === 'coin' ? 0.22 : 0.32;

      if (distanceX < collisionWidth) {
        if (ent.type === 'coin') {
          coins += 25;
          document.getElementById('coinsVal').innerText = coins;
          playTone(880, 'square', 0.1, 0.15); // Som de moeda Premium
          entities.splice(i, 1);
        } else {
          // Explosão e Game Over
          gameOver = true; gameRunning = false;
          camShake = 25;
          playTone(100, 'sawtooth', 0.6, 0.4); // Som de batida pesada
          document.getElementById('finalScore').innerText = score;
          document.getElementById('finalCoins').innerText = coins;
          document.getElementById('gameOverScreen').classList.remove('hidden');
        }
      }
    }
  }
}

function draw() {
  ctx.save();
  // Aplica tremor da tela na câmera inteira
  if (camShake !== 0) ctx.translate(camShake, camShake);

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // 1. CÉU / HORIZONTE CYBERPUNK
  let skyGrad = ctx.createLinearGradient(0, 0, 0, horizon);
  skyGrad.addColorStop(0, '#0a0a1a'); skyGrad.addColorStop(0.6, '#1a0033'); skyGrad.addColorStop(1, '#ff3366');
  ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, canvas.width, horizon);

  // Montanhas/Linha da Cidade Distante em Vetor
  ctx.fillStyle = '#0f051d';
  for(let i = -100; i < canvas.width + 100; i += 60) {
    let h = 40 + Math.sin(i + (curveMagnitude * 2)) * 25;
    ctx.fillRect(i - (curveMagnitude * 10), horizon - h, 62, h);
  }

  // 2. TERRENO LATERAL COM LINHAS DE VELOCIDADE (Efeito Retro-Futurista)
  ctx.fillStyle = '#0b1d12'; ctx.fillRect(0, horizon, canvas.width, canvas.height - horizon);
  
  // Faixas de velocidade na grama (Mudam conforme trackPos corre)
  let grassStrip = Math.sin(trackPos * 0.05) > 0;
  ctx.fillStyle = grassStrip ? '#0e2919' : '#08170e';
  ctx.beginPath();
  ctx.moveTo(0, horizon); ctx.lineTo(canvas.width, horizon);
  ctx.lineTo(canvas.width, canvas.height); ctx.lineTo(0, canvas.height);
  ctx.fill();

  // 3. PISTA PSEUDO-3D PREMIUM (Cálculo de Projeção Dinâmica)
  let pTopX1 = roadX - 15, pTopX2 = roadX + 15;
  let pBotX1 = (canvas.width/2) - roadW/2 + (curveMagnitude*120), pBotX2 = (canvas.width/2) + roadW/2 + (curveMagnitude*120);

  // Asfalto
  ctx.fillStyle = '#1b1b22';
  ctx.beginPath(); ctx.moveTo(pTopX1, horizon); ctx.lineTo(pTopX2, horizon);
  ctx.lineTo(pBotX2, canvas.height); ctx.lineTo(pBotX1, canvas.height);
  ctx.closePath(); ctx.fill();

  // Zebras Laterais Vermelhas e Brancas Dinâmicas
  let zebraStep = Math.sin(trackPos * 0.1) > 0;
  ctx.strokeStyle = zebraStep ? '#fff' : '#e60000';
  ctx.lineWidth = 12;
  ctx.beginPath();
  ctx.moveTo(pTopX1, horizon); ctx.lineTo(pBotX1, canvas.height);
  ctx.moveTo(pTopX2, horizon); ctx.lineTo(pBotX2, canvas.height);
  ctx.stroke();

  // Linhas Intermediárias Divisórias da Pista
  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.setLineDash([15, 20]);
  ctx.lineDashOffset = -trackPos * 0.8;
  
  // Linha esquerda interna
  ctx.beginPath();
  ctx.moveTo(pTopX1 + 10, horizon); ctx.lineTo(pBotX1 + (pBotX2-pBotX1)*0.33, canvas.height);
  // Linha direita interna
  ctx.moveTo(pTopX2 - 10, horizon); ctx.lineTo(pBotX1 + (pBotX2-pBotX1)*0.66, canvas.height);
  ctx.stroke();
  ctx.setLineDash([]); // Reset dash

  // 4. RENDERIZADOR DE ENTIDADES (Tráfego e Moedas em Perspectiva Real)
  entities.sort((a,b) => a.z - b.z);
  entities.forEach(ent => {
    let size = ent.z;
    let cY = horizon + (canvas.height - horizon) * ent.z;
    
    // Interpolação de perspectiva na curva
    let curRoadW = roadW * ent.z;
    let roadCenterX = horizon + (canvas.height - horizon) * ent.z; 
    let cX = (canvas.width/2) + (ent.x * curRoadW * 0.5) + (curveMagnitude * 120 * ent.z);

    let w = 85 * size, h = 55 * size;

    if (ent.type === 'coin') {
      // Moeda 3D Rotativa Iluminada
      let pulse = Math.sin(Date.now() * 0.01) * w/3;
      ctx.fillStyle = '#ffcc00';
      ctx.strokeStyle = '#fff'; ctx.lineWidth = Math.max(1, 2 * size);
      ctx.beginPath(); ctx.ellipse(cX, cY - h/2, Math.abs(pulse), w/2.5, 0, 0, Math.PI*2);
      ctx.fill(); ctx.stroke();
      // Brilho interno
      ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.ellipse(cX, cY - h/2, Math.abs(pulse)*0.4, w/6, 0, 0, Math.PI*2); ctx.fill();
    } else {
      // Carros do Tráfego (Modelagem Vetorial Premium)
      // Sombra do veículo
      ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fillRect(cX - w/2, cY - 4, w, 8);
      // Chassi Principal
      ctx.fillStyle = ent.carColor; ctx.fillRect(cX - w/2, cY - h, w, h * 0.7);
      // Cabine/Vidros
      ctx.fillStyle = '#0b0b14'; ctx.fillRect(cX - w/3, cY - h, (w*2/3), h*0.4);
      // Vidro Traseiro com reflexo
      ctx.fillStyle = '#2b4466'; ctx.fillRect(cX - w/3.5, cY - h + (2*size), (w*2/3.8), h*0.25);
      // Rodas
      ctx.fillStyle = '#050505';
      ctx.fillRect(cX - w/2, cY - h * 0.3, w*0.15, h*0.3);
      ctx.fillRect(cX + w/2 - (w*0.15), cY - h * 0.3, w*0.15, h*0.3);
      // Lanternas Traseiras de Freio em LED
      ctx.fillStyle = '#ff1a1a';
      ctx.fillRect(cX - w/2 + (4*size), cY - h*0.5, w*0.15, h*0.12);
      ctx.fillRect(cX + w/2 - (4*size) - (w*0.15), cY - h*0.5, w*0.15, h*0.12);
    }
  });

  // 5. CARRO DO JOGADOR (SUPER SPORT AUTOMÓVEL AMANHECER)
  let pScreenX = (canvas.width/2) + (player.x * roadW * 0.5) + (curveMagnitude * 120 * 0.88);
  let pW = player.w, pH = player.h;

  ctx.save();
  // Sombra projetada no asfalto
  ctx.fillStyle = 'rgba(0,0,0,0.55)';
  ctx.fillRect(pScreenX - pW/2 + 4, player.y + pH - 6, pW - 8, 12);

  // Aerofólio Traseiro Esportivo (Estilo Miniclip Tuning)
  ctx.fillStyle = '#990000';
  ctx.fillRect(pScreenX - pW/2 - 4, player.y - 6, pW + 8, 6);
  ctx.fillStyle = '#111';
  ctx.fillRect(pScreenX - pW/2 - 4, player.y - 6, 4, 8);
  ctx.fillRect(pScreenX + pW/2, player.y - 6, 4, 8);

  // Corpo do Carro Amarelo Premium (Texturizado em Vetores)
  ctx.fillStyle = '#ffaa00'; // Cor base ouro/amarelo corrida
  ctx.fillRect(pScreenX - pW/2, player.y, pW, pH * 0.75);
  
  // Detalhe de Faixa de Corrida Central
  ctx.fillStyle = '#111'; ctx.fillRect(pScreenX - 6, player.y, 12, pH * 0.75);

  // Cabine de Vidro Fumê
  ctx.fillStyle = '#151522'; ctx.fillRect(pScreenX - pW/3.2, player.y + 4, (pW*2/3.5), pH * 0.35);
  ctx.fillStyle = '#66ccff'; ctx.fillRect(pScreenX - pW/4, player.y + 6, (pW*2/4.2), pH * 0.2); // Brilho do vidro

  // Rodas/Pneus Largos de Performance
  ctx.fillStyle = '#111';
  ctx.fillRect(pScreenX - pW/2 - 1, player.y + pH - 20, 5, 16);
  ctx.fillRect(pScreenX + pW/2 - 4, player.y + pH - 20, 5, 16);

  // Lanternas Traseiras Esportivas Neon Acesas
  ctx.fillStyle = '#ff0033';
  ctx.shadowBlur = 10; ctx.shadowColor = '#ff0000'; // Efeito Glow Neon real no Canvas!
  ctx.fillRect(pScreenX - pW/2 + 6, player.y + pH - 18, 14, 6);
  ctx.fillRect(pScreenX + pW/2 - 20, player.y + pH - 18, 14, 6);
  
  // Placa Traseira Customizada
  ctx.fillStyle = '#000'; ctx.shadowBlur = 0;
  ctx.fillRect(pScreenX - 8, player.y + pH - 15, 16, 6);

  ctx.restore();
  ctx.restore(); // Fecha efeito cameraShake
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

// Interações da Interface
document.getElementById('startBtn').onclick = () => {
  document.getElementById('menuScreen').classList.add('hidden');
  gameRunning = true; resetGame();
};

document.getElementById('restartBtn').onclick = () => {
  document.getElementById('gameOverScreen').classList.add('hidden');
  gameRunning = true; resetGame();
};

// Start Engine
resize();
requestAnimationFrame(loop);
</script>
</body>
</html>
